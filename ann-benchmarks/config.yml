# ANN-Benchmarks algorithm config for `vectors`.
#
# Schema matches the current ann-benchmarks layout (ann_benchmarks/algorithms/<name>/config.yml):
# under `float:`, `any:` (all metrics) maps to a LIST of algorithm-definition dicts using
# UNDERSCORE keys (base_args, docker_tag, run_groups, arg_groups, query_args) and a required
# `name`. `@metric` is substituted by the harness with the dataset's distance
# ("euclidean" / "angular"); the adapter maps euclidean->EUCLIDEAN, angular->COSINE.
#
# List-valued entries in arg_groups expand into a cartesian product (definitions.py uses
# itertools.product), so one arg_group dict sweeps every M x efConstruction combination.
#
# - HNSW / VAMANA (graph): the recall-vs-QPS curve is swept at QUERY time via the efSearch
#   values in query_args.
# - IVF_PQ: nprobe is a BUILD-time setting in `vectors`, swept via arg_groups (each value
#   rebuilds the index); query_args carries a single placeholder the adapter ignores.
float:
  any:
  - name: vectors
    constructor: Vectors
    module: ann_benchmarks.algorithms.vectors
    docker_tag: ann-benchmarks-vectors
    disabled: false
    base_args: ['@metric']
    run_groups:
      hnsw:
        arg_groups: [{indexType: [HNSW], M: [16, 24, 32], efConstruction: [200, 500]}]
        query_args: [[20, 40, 80, 120, 200, 400, 800]]
      vamana:
        arg_groups: [{indexType: [VAMANA], R: [32, 64], L: [128], alpha: [1.2]}]
        query_args: [[40, 80, 120, 200, 400, 800]]
      ivfpq:
        arg_groups:
          - {indexType: [IVF_PQ], nlist: [256, 1024], nprobe: [8, 16, 32, 64, 128],
             pqSubspaces: [16], pqClusters: [256], rescore: [4]}
        query_args: [[0]]
