# ANN-Benchmarks algorithm config for `vectors` (EMBEDDED-LIBRARY bench).
#
# This is the single-node, in-memory recall-vs-QPS head-to-head — the bracket hnswlib / FAISS /
# Lucene live in. (The DISTRIBUTED object-storage bench — cold/warm latency + $/TB vs turbopuffer —
# is a different harness: vectors-bench/.../TurbopufferS3Benchmark.java.)
#
# Schema matches ann_benchmarks/algorithms/<name>/config.yml: under `float:`, `any:` maps to a LIST
# of algorithm-definition dicts using UNDERSCORE keys. `@metric` is substituted with the dataset
# distance ("euclidean"/"angular"); the adapter maps euclidean->EUCLIDEAN, angular->COSINE.
# arg_groups expand as a cartesian product (M x efConstruction), so one dict sweeps every combo.
#
# GRID IS DELIBERATELY TRIMMED for a tractable head-to-head (~8 index builds x RUN_COUNT vs the
# original 18): the ann-benchmarks 1-CPU limit makes each 1M build minutes-long, and build time is
# reported separately from the QPS/recall curve that is the actual comparison. HNSW is the marquee
# apples-to-apples vs hnswlib; a lean Vamana + IVF-PQ line show the other index types. Widen the
# sweeps (commented "full grid" values) for a publication run once the shape looks right.
float:
  any:
  - name: vectors
    constructor: Vectors
    module: ann_benchmarks.algorithms.vectors
    docker_tag: ann-benchmarks-vectors
    disabled: false
    base_args: ['@metric']
    run_groups:
      # QUICK head-to-head: 2 HNSW builds only (each 1M-vector build is ~50 min at the 1-CPU
      # ann-benchmarks limit, so build count dominates wall time). A low+high (M,efC) pair still
      # traces a recall-vs-QPS curve via the 5 efSearch points. Re-add the vamana/ivfpq groups and
      # widen M/efC for a fuller publication run once this confirms the pipeline end-to-end.
      # Two SEPARATE run_groups = two distinct configs. (Multiple dicts inside one arg_groups list
      # are passed as multiple constructor args, not separate configs — that's the TypeError trap.)
      hnsw_fast:
        arg_groups: [{indexType: [HNSW], M: [16], efConstruction: [200]}]
        query_args: [[40, 80, 120, 200, 400]]
      hnsw_hi:
        arg_groups: [{indexType: [HNSW], M: [32], efConstruction: [500]}]
        query_args: [[40, 80, 120, 200, 400]]
