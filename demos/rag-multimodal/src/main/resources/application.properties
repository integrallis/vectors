# java-vectors Multimodal RAG Demo Configuration
# ================================================

# vectors-server connection
vectors.server.url=http://localhost:8287

# LLM Provider: OPENAI, ANTHROPIC, AZURE, OLLAMA
llm.provider=OPENAI

# OpenAI settings
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o
openai.temperature=0.7
openai.max.tokens=2048

# Anthropic settings (optional)
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-3-5-sonnet
anthropic.temperature=0.7
anthropic.max.tokens=2048

# Azure settings (optional)
azure.api.key=${AZURE_OPENAI_API_KEY:}
azure.endpoint=
azure.model=gpt-4o

# Ollama settings (optional, local)
ollama.base.url=http://localhost:11434
ollama.model=llama3.2-vision

# RAG parameters
rag.max.results=5
rag.min.score=0.7

# PDF processing
pdf.max.pages=500
